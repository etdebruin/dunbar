# Fly config for the dunbar API. Deploy with: fly deploy --config fly.toml
app = "dunbar-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # DATABASE_URL + DATABASE_SSL are set via `fly secrets`.

# Note: the server applies the (idempotent) schema on boot, so no
# release_command is needed. A separate release machine is also the flakiest
# part of a Fly deploy; skipping it keeps deploys deterministic. If migrations
# ever become non-idempotent/ordered, reintroduce a release_command.

[processes]
  app = "node /app/server.js"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
